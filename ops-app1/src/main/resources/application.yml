spring:
  application:
    name: ops-app1
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    

server:
  port: 8080
  

app:
  profile: ${PROFILE:default}
  ops-app2-url: ${OPS_APP2_URL:http://ops-app2:8081}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      probes:
        enabled: true
   #   show-details: when_authorized #여기 주석

logging:
  level:
    ops.app1: INFO #package 맞춰주기
    org.springframework.web: INFO